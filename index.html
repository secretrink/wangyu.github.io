    function startBettingPhase() {
        state.gameState = 'BETTING';
        state.timeLeft = 15;
        countdownEl.style.color = '#d32f2f';
        countdownEl.textContent = state.timeLeft; 
        
        const centerCircle = document.querySelector('.center-circle');
        
        // Remove old anim pointers
        document.querySelectorAll('.anim-pointer').forEach(el => el.remove());

        // Clear bets from previous round
        state.confirmedBets = {};
        state.pendingBets = {};
        
        // Force clear all bet displays
        clearBettingPanel();
        
        // Double check clear
        setTimeout(clearBettingPanel, 100);
        
        updateTotalBet();
        checkConfirmButtonState();
        
        // Reset Visuals
        document.querySelectorAll('.win-highlight').forEach(el => el.classList.remove('win-highlight'));
        winModal.style.display = 'none';
        centerLogo.style.display = 'block';
        winAnimalDisplay.classList.remove('show', 'spinning', 'popped');
        winAnimalDisplay.style.opacity = 0;
        centerResult.style.display = 'none';
        centerResult.style.background = 'rgba(0,0,0,0)';
        centerResult.innerHTML = '';
        
        playAudio('vote');

        const tick = () => {
            if (state.gameState !== 'BETTING') return; // Stop if changed
            
            countdownEl.textContent = state.timeLeft;
            if (state.timeLeft > 0) {
                state.timeLeft--;
                setTimeout(tick, 1000);
            } else {
                startSpinPhase();
            }
        };
        tick();
    }

    function startSpinPhase() {
        state.gameState = 'SPINNING';
        countdownEl.textContent = "0";
        stopAudio('vote');
        playAudio('rotate_effect');
        playAudio('rotate_bgm');
        
        state.pendingBets = {};
        renderAllBets();
        updateTotalBet();
        checkConfirmButtonState();
        
        if (Object.keys(state.confirmedBets).length > 0) {
            state.previousBets = {...state.confirmedBets};
        }

        const stepDeg = 360 / 24;
        const targetSectorIndex = Math.floor(Math.random() * 24);
        const resultItem = WHEEL_LAYOUT[targetSectorIndex];
        const resultColor = currentColorMap[targetSectorIndex];
        
        const currentPointer = state.pointerRotation;
        const currentRing = state.animalRingRotation;
        
        const spins = 5;
        const duration = 5000;
        
        const snappedRing = Math.round(currentRing / stepDeg) * stepDeg;
        const ringSteps = Math.floor(Math.random() * 24);
        const finalRing = snappedRing - (spins * 360) - (ringSteps * stepDeg);
        
        const targetCenter = targetSectorIndex * stepDeg + stepDeg / 2;
        const targetPointerAngle = finalRing + targetCenter;
        const currentPointerMod = ((currentPointer % 360) + 360) % 360;
        const targetPointerMod = ((targetPointerAngle % 360) + 360) % 360;
        const pointerDelta = (targetPointerMod - currentPointerMod + 360) % 360;
        const finalPointer = currentPointer + (spins * 360) + pointerDelta;
        
        state.pointerRotation = finalPointer;
        state.animalRingRotation = finalRing;
        state.spinId += 1;
        const spinId = state.spinId;
        
        pointerContainer.style.transition = `transform ${duration}ms cubic-bezier(0.25, 0.1, 0.25, 1)`;
        animalRing.style.transition = `transform ${duration}ms cubic-bezier(0.25, 0.1, 0.25, 1)`;
        
        const items = document.querySelectorAll('.wheel-item');
        items.forEach(item => {
            item.style.transition = `transform ${duration}ms cubic-bezier(0.25, 0.1, 0.25, 1)`;
        });

        pointerContainer.offsetHeight; 

        pointerContainer.style.transform = `rotate(${finalPointer}deg)`;
        animalRing.style.transform = `rotate(${finalRing}deg)`;
        
        items.forEach(item => {
             item.style.transform = `translate(-50%, -50%) rotate(${-finalRing}deg)`;
        });
        
        const finishSpin = () => {
            if (state.gameState !== 'SPINNING') return;
            if (state.spinId !== spinId) return;
            handleResult(resultItem, resultColor);
        };
        const onTransitionEnd = () => {
            pointerContainer.removeEventListener('transitionend', onTransitionEnd);
            finishSpin();
        };
        pointerContainer.addEventListener('transitionend', onTransitionEnd, { once: true });
        setTimeout(finishSpin, duration + 100);
    }

    function handleResult(item, color) {
        state.gameState = 'RESULT';
        stopAudio('rotate_bgm');
        stopAudio('rotate_effect');
        playAudio('bounce');
        
        // 1. Center Animation Sequence
        centerLogo.style.display = 'none';
        
        // New Animation: Orbit -> Center -> Blur
        // Create Clone for animation
        const animIcon = document.createElement('div');
        animIcon.className = 'anim-pointer';
        animIcon.style.display = 'block';
        
        const innerIcon = document.createElement('div');
        innerIcon.className = 'animal-icon';
        innerIcon.style.backgroundImage = `url('${item.animal.icon}')`;
        
        
        animIcon.appendChild(innerIcon);
        document.querySelector('.center-circle').appendChild(animIcon);
        
        // Phase 1: Rotate around inner circle (Clockwise)
        // Start from Top (0 deg)? Or current pointer position?
        // User said: "Head towards outside, rotate around inner circle clockwise 1 round"
        // Let's start at 0deg (Top).
        
        // Animate Rotation
        const duration = 1000;
        animIcon.animate([
            { transform: 'rotate(0deg)' },
            { transform: 'rotate(360deg)' }
        ], {
            duration: duration,
            easing: 'linear',
            fill: 'forwards'
        }).onfinish = () => {
             // Phase 2: Move to Center
             // We are at 360deg (same as 0).
             // Animate innerIcon (which is at bottom: 60px radius) to center (bottom: 0px)?
             // Or just scale/transform.
             // Currently: .anim-pointer is centered. .animal-icon is absolute at bottom: 60px.
             // We want .animal-icon to move to top: 50%, left: 50% (center of container).
             
             innerIcon.style.transition = 'all 0.5s ease-in-out';
             innerIcon.style.bottom = '50%';
             innerIcon.style.left = '50%';
             innerIcon.style.transform = 'translate(-50%, 50%) scale(2)';
             
            setTimeout(() => {
                centerResult.innerHTML = animalSpriteHTML(item.animal);
                centerResult.style.background = 'rgba(0,0,0,0)';
                centerResult.style.display = 'flex';
                
                setTimeout(() => {
                    processPayout(item, color);
                }, 500);
            }, 500);
        };
    }
    
    function processPayout(item, color) {
        let totalWin = 0;
        const animalKey = `${item.animal.id}_${color.id}`;
        
        if (state.confirmedBets[animalKey]) {
            let colorIdx = 0;
            if (color.id === 'green') colorIdx = 1;
            if (color.id === 'yellow') colorIdx = 2;
            totalWin += state.confirmedBets[animalKey] * item.animal.odds[colorIdx];
        }
        
        // Special Bets
        const specialRes = Math.random();
        let specialKey = specialRes < 0.4 ? 'zhuang' : (specialRes < 0.8 ? 'xian' : 'he');
        const specialCell = document.querySelector(`.special-cell.${specialKey}`);
        if (specialCell) specialCell.classList.add('win-highlight');
        if (state.confirmedBets[specialKey]) {
            const odds = specialKey === 'he' ? 8 : 2;
            totalWin += state.confirmedBets[specialKey] * odds;
        }
        
        const winCell = document.getElementById(`cell-${animalKey}`);
        if (winCell) winCell.classList.add('win-highlight');

        if (totalWin > 0) {
            playAudio('result');
            setTimeout(() => playAudio('add_score'), 500);
            state.balance += totalWin;
            winScoreEl.textContent = totalWin;
            winModal.style.display = 'flex';
        }
        updateBalance();
        addToHistory(item, color, specialKey);
        
        // Refresh Colors Animation (1s duration)
        setTimeout(() => {
            animateColorRefresh();
        }, 1000);

        // Countdown Start AFTER Animation & Color Refresh
        setTimeout(() => {
            startBettingPhase();
        }, 3000);
    }

    function addToHistory(item, color, specialKey) {
        const prevNew = historyBar.querySelector('.history-item.is-new');
        if (prevNew) prevNew.classList.remove('is-new');

        const div = document.createElement('div');
        div.className = `history-item ${color.id} push-up is-new`;
        div.innerHTML = animalSpriteHTML(item.animal);
        const specialMap = { zhuang: '庄', xian: '闲', he: '和' };
        const specialText = specialMap[specialKey] || '';
        if (specialText) {
            const badge = document.createElement('div');
            badge.className = `history-special ${specialKey}`;
            badge.textContent = specialText;
            div.appendChild(badge);
        }
        historyBar.prepend(div);
        
        // Remove animation class after it finishes
        setTimeout(() => {
            div.classList.remove('push-up');
        }, 500);

        state.history.unshift({ animalId: item.animal.id, colorId: color.id, specialKey });
        if (state.history.length > 50) state.history.length = 50;
        if (historyModal && historyModal.style.display === 'flex') renderHistoryModal();

        if (historyBar.children.length > 10) {
            historyBar.lastChild.remove();
        }
    }

    init();

</script>
