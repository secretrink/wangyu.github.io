<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森林舞会 (Forest Dance)</title>
    <style>
        :root {
            --color-red: #e74c3c;
            --color-green: #2ecc71;
            --color-yellow: #f1c40f;
            --bg-wood: #8d6e63;
            --panel-bg: #5d4037;
            --text-gold: #ffd700;
            --animal-lion-url: none;
            --animal-panda-url: none;
            --animal-monkey-url: none;
            --animal-rabbit-url: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://img.freepik.com/free-vector/jungle-background_23-2148041857.jpg?w=1380&t=st=1709540000~exp=1709540600~hmac=abc') no-repeat center center fixed; 
            background-size: cover;
            background-color: #2e7d32; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            color: white;
        }
        
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        .main-container {
            display: flex;
            width: 95vw;
            max-width: 1800px;
            height: 90vh; /* Increase height */
            gap: 50px; 
            align-items: center;
        }

        /* 左侧转盘区 */
        .left-panel {
            flex: 1.5; 
            display: flex;
            flex-direction: column; 
            justify-content: flex-start; /* Move content up */
            align-items: center;
            position: relative;
            height: 100%;
            gap: 20px;
            padding-top: 10px; /* Reduced padding to move up */
        }

        .wheel-container {
            position: relative;
            /* Use min/max to ensure square */
            width: clamp(550px, 85vh, 950px); /* Increased size */
            height: clamp(550px, 85vh, 950px);
            /* Force Aspect Ratio 1:1 */
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0; /* Prevent shrinking into ellipse */
            margin-top: -20px; /* Shift up slightly */
        }

        .light-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 12;
            background:
                radial-gradient(circle at 50% 50%, transparent 86%, rgba(0,0,0,0.15) 87% 100%),
                repeating-conic-gradient(from -7.5deg, #ffe082 0deg 6deg, #ffb300 6deg 15deg);
            -webkit-mask: radial-gradient(transparent 86%, black 87%);
            mask: radial-gradient(transparent 86%, black 87%);
            filter: drop-shadow(0 0 26px rgba(255, 215, 64, 0.85));
        }

        /* 1. 动物头像层 (最外层) */
        .animal-ring-wrap {
            position: absolute;
            inset: 40px; /* Use inset to stretch relative to square container */
            z-index: 10;
            pointer-events: none;
        }

        .animal-ring-container {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            /* transition: transform 0.1s linear; */
            /* Removed default transition, controlled by JS */
            transform-origin: center center; /* Ensure rotation center */
        }

        .animal-band {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: transparent;
            -webkit-mask: radial-gradient(transparent 76%, black 77%);
            mask: radial-gradient(transparent 76%, black 77%);
            opacity: 0;
            z-index: 0;
        }

        .wheel-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 78px;
            height: 78px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.2rem;
            z-index: 1;
            border-radius: 50%;
            background: transparent;
            box-shadow: none;
            /* Add transition for counter-rotation */
            transition: transform 5000ms cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .animal-icon {
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
        }
        .animal-lion { background-image: var(--animal-lion-url), url('assets/animals/lion.png'), url('assets/animals/lion.svg'); }
        .animal-panda { background-image: var(--animal-panda-url), url('assets/animals/panda.png'), url('assets/animals/panda.svg'); }
        .animal-monkey { background-image: var(--animal-monkey-url), url('assets/animals/monkey.png'), url('assets/animals/monkey.svg'); }
        .animal-rabbit { background-image: var(--animal-rabbit-url), url('assets/animals/rabbit.png'), url('assets/animals/rabbit.svg'); }

        /* Prevent animals from rotating with the ring? No, they must rotate. */
        /* But maybe the image itself should stay upright? */
        /* If the user wants "Ferris Wheel" effect, we need to counter-rotate. */
        /* But that is complex. */
        /* Let's try removing the rotate(${angleDeg}deg) in JS and see. */
        /* Wait, if I remove rotation, they are all upright relative to the screen initially. */
        /* As the ring spins, they will rotate relative to screen. */
        /* To keep them UPRIGHT relative to screen always, we need `transform: rotate(-ringAngle)` on each item. */
        
        /* 2. 颜色层 (中间层) */
        .color-ring-container {
            position: absolute;
            inset: 120px; /* Use inset */
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
        }
        
        /* New Color Segments Style */
        .color-segment {
            position: absolute;
            top: 0;
            left: 50%;
            width: 24px; /* Approximate arc width at outer edge? No, segment is wedge. */
            height: 50%;
            transform-origin: bottom center;
            clip-path: polygon(0 0, 100% 0, 50% 100%); /* Triangle/Wedge */
            /* A better wedge: polygon(0 0, 100% 0, 50% 100%) is too sharp. */
            /* We need a sector. CSS clip-path doesn't do curves well. */
            /* Let's use skew/rotate method on rectangle. */
        }
        
        /* Better method for gaps: Conic Gradient with transparent stops */
        .color-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Background set by JS */
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
            mask: radial-gradient(transparent 55%, black 56%);
        }

        /* 3. 最里层 (中心图标 + 开奖展示) */
        .center-circle {
            position: absolute;
            width: 380px; /* Slightly larger */
            height: 380px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border-radius: 50%;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 10px solid #5d4037;
            box-shadow: inset 0 0 50px #000;
            overflow: visible; 
            pointer-events: none;
            transition: background 0.5s; /* Smooth bg color change */
        }

        .center-result {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 21;
            background: rgba(0,0,0,0);
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .center-result .animal-icon { width: 120px; height: 120px; }

        .center-logo {
            width: 320px;
            height: 320px;
            /* background: url('assets/center-logo.png') no-repeat center center; */
            background-size: contain;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .center-logo h1 { font-size: 3rem; }
        .center-logo h2 { font-size: 1.5rem; }

        /* 赢分动画动物 (Center Spin) */
        .win-animal-display {
            position: absolute;
            width: 150px;
            height: 150px;
            font-size: 6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 22;
        }
        .win-animal-display .animal-icon { width: 120px; height: 120px; }
        
        /* 顺时针转圈动画 */
        /* Animation will be handled by JS now for custom trajectory */
        
        /* 弹出动画 */
        @keyframes popOut {
            0% { transform: scale(0.1); opacity: 0; }
            60% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .win-animal-display.popped {
            opacity: 1;
            transform: scale(1.2);
            animation: popOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Temp Pointer for Animation */
        .anim-pointer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            z-index: 55;
            pointer-events: none;
            display: none;
        }
        .anim-pointer .animal-icon {
            position: absolute;
            bottom: 60px; /* Radius */
            left: -40px;
            width: 80px;
            height: 80px;
            /* Point head outward? If icon is upright, head is up. 
               If we rotate the pointer container, the icon rotates.
               If we want head OUT, icon top should point away from center.
               Bottom is at center. 
               Wait, "Head towards outside". 
               Standard icon is upright. 
               If we rotate pointer by 90deg (Right), icon is rotated 90deg. Top is Right.
               So if we just place icon at some radius, and rotate parent, 
               the icon's "Top" will point in the direction of rotation if not counter-rotated.
               But we want "Head Out". 
               So we need the icon to be rotated such that its top is away from center.
               At 0 deg (Top), Icon Top is Up (Away). Good.
               At 90 deg (Right), Icon Top should be Right (Away). Good.
               So just rotating the container is enough! No counter-rotation needed for "Head Out".
            */
        }

        /* 顶部开奖结果展示 (Red Bubble) */
        .top-result-bubble {
            position: absolute;
            top: -50px; /* Above the wheel */
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: #d32f2f;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 50;
            display: none; /* Show on win */
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            animation: dropIn 0.5s ease-out;
        }
        .top-result-bubble .animal-icon { width: 80px; height: 80px; }
        @keyframes dropIn {
            0% { top: -100px; opacity: 0; }
            100% { top: -50px; opacity: 1; }
        }

        /* 指针 (弓箭样式) */
        .pointer-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            pointer-events: none;
            transition: transform 0.1s linear;
            transform-origin: 50% 50%;
        }

        .bow-arrow-pointer {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 86px;
            height: 340px;
            transform: translateX(-50%);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 900"><defs><linearGradient id="shaft" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="%230f5c69"/><stop offset="1" stop-color="%2307353d"/></linearGradient><linearGradient id="metal" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="%23bdbdbd"/><stop offset="1" stop-color="%23757575"/></linearGradient></defs><rect x="56" y="160" width="10" height="600" rx="5" fill="url(%23shaft)"/><polygon points="61,120 35,170 87,170" fill="url(%23metal)" stroke="%23555555" stroke-width="3"/><circle cx="61" cy="210" r="12" fill="%23d4af37" stroke="%23a67c00" stroke-width="3"/><circle cx="61" cy="250" r="12" fill="%23d4af37" stroke="%23a67c00" stroke-width="3"/><rect x="52" y="760" width="28" height="45" rx="10" fill="%232e7d32" opacity="0.0"/></svg>') no-repeat center center;
            background-size: contain;
            background-position: center top;
            min-height: 240px;
            max-height: 520px;
        }
        
        /* Adjust Bow Arrow to point from center OUT? 
           The user said "Bow and Arrow style". 
           Let's make a CSS shape or simple SVG.
           The pointer rotates CW.
           Ideally the "Arrow Head" is at the top (0 deg).
        */
        .pointer-arrow {
            position: absolute;
            bottom: 50%;
            left: 50%;
            width: 10px;
            height: 300px; /* Radius length */
            background: #8d6e63; /* Shaft */
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }
        .pointer-arrow::before { /* Head */
            content: '';
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 40px solid gold;
            margin-top: -20px;
        }
        .pointer-arrow::after { /* Feathers */
            content: '';
            position: absolute;
            bottom: 20px;
            width: 30px;
            height: 30px;
            background: red;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }
        .pointer-bow {
            position: absolute;
            bottom: 100px; /* Position along shaft */
            width: 80px;
            height: 40px;
            border-top: 5px solid #5d4037;
            border-radius: 50% 50% 0 0;
        }

        /* 倒计时框 - Center Top */
        .timer-box {
            position: relative; 
            top: 0; 
            background: white;
            padding: 10px 50px; 
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 60;
            text-align: center;
            border: 4px solid #d32f2f;
            margin-bottom: 20px;
            width: 150px; 
        }
        .timer-val {
            font-size: 2.5rem;
            font-weight: bold;
            color: #d32f2f;
        }

        .right-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Center the whole right side */
            height: 100%;
            overflow: hidden; /* Prevent stretch */
        }

        /* 右侧押注面板 */
        .right-panel {
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjNWQ0MDM3Ii8+CjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjEiIGZpbGw9IiM0ZTM0MmUiLz4KPC9zdmc+') repeat;
            background-color: var(--panel-bg);
            border-radius: 20px;
            padding: 20px;
            border: 8px solid #3e2723;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            max-width: 100%; /* Ensure it doesn't overflow */
        }

        /* 历史记录 */
        .history-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            overflow-x: auto;
            margin-bottom: 0;
            height: 84px;
            flex-grow: 1; 
            min-width: 0; 
        }
        /* 历史记录 - Full Width Breakout */
        .history-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 -20px 10px -20px; /* Break padding */
            padding: 0 10px;
            width: calc(100% + 40px);
            overflow: hidden;
        }
        .history-btn {
            padding: 10px 14px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.35);
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }
        .history-btn:active { transform: scale(0.98); }
        .history-item {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.35);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .history-item .animal-icon {
            position: absolute;
            top: 4px;
            left: 0;
            right: 0;
            height: calc(100% - 18px);
        }
        .history-item.red { --hist-color: #e74c3c; }
        .history-item.green { --hist-color: #2ecc71; }
        .history-item.yellow { --hist-color: #f1c40f; }
        .history-item::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 18px;
            background: var(--hist-color, rgba(255,255,255,0.2));
            opacity: 0.95;
        }
        .history-item.is-new::before {
            content: 'new';
            position: absolute;
            left: 8px;
            bottom: 4px;
            color: #fff;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            z-index: 2;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
        }
        .history-special {
            position: absolute;
            right: 6px;
            bottom: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.9rem;
            z-index: 2;
            border: 2px solid rgba(255,255,255,0.85);
            box-shadow: 0 2px 6px rgba(0,0,0,0.7);
            color: #fff;
        }
        .history-special.zhuang { background: #e53935; }
        .history-special.xian { background: #43a047; }
        .history-special.he { background: #fdd835; color: #222; }
        .history-item.push-up {
            animation: pushUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pushUp {
            from { transform: translateY(50px) scale(0.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .history-item.red { background: transparent; }
        .history-item.green { background: transparent; }
        .history-item.yellow { background: transparent; }

        /* 押注网格 */
        .bet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Red, Green, Yellow */
            grid-template-rows: repeat(4, 1fr) 0.8fr; /* Animals + Special */
            gap: 10px;
            flex: 1;
            padding: 10px;
        }

        .bet-cell {
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            flex-direction: row; /* Horizontal layout */
            justify-content: space-between;
            align-items: center;
            position: relative;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            transition: all 0.1s;
            height: 70px; /* Fixed height for horizontal look */
        }
        .bet-cell:active { transform: scale(0.95); }
        
        /* 颜色对应背景 */
        .col-red { background: linear-gradient(to right, #ef5350, #c62828); }
        .col-green { background: linear-gradient(to right, #66bb6a, #2e7d32); }
        .col-yellow { background: linear-gradient(to right, #ffee58, #fbc02d); color: #333; }
        
        /* 特殊行 */
        .special-row {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 5px;
        }
        .special-cell {
            color: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column; /* Special cells stay vertical or change? Let's keep vertical or match */
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            height: 70px;
        }
        .special-cell.zhuang { background: linear-gradient(to bottom, #d32f2f, #b71c1c); }
        .special-cell.xian { background: linear-gradient(to bottom, #1976d2, #0d47a1); }
        .special-cell.he { background: linear-gradient(to bottom, #388e3c, #1b5e20); }

        .cell-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .cell-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .animal-img {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
        }
        .animal-img .animal-icon { width: 56px; height: 56px; }

        .bet-amount-box {
            background: rgba(0,0,0,0.6);
            color: #fff;
            min-width: 60px;
            text-align: center;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1.2rem;
            padding: 2px 5px;
        }
        .bet-amount-box.pending {
            color: #ffd700; /* Yellow text for unconfirmed bets */
            border: 1px dashed #ffd700;
        }

        /* 底部控制栏 */
        .bottom-bar {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-weight: bold;
        }

        .total-bet-display {
            font-size: 1.2rem;
            color: #ffd700;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chip-selector {
            display: flex;
            gap: 10px;
            position: relative;
            align-items: center;
        }

        .chip {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #ffd700);
            border: 4px dashed #fff;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #d35400;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .chip.selected {
            transform: scale(1.2) translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
            border-color: #ff5722;
        }

        .chip-setting-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #607d8b;
            border: 4px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        .chip-setting-btn.active {
            background: #ff5722;
            transform: scale(1.1);
        }

        .chip-menu {
            position: absolute;
            bottom: 70px;
            left: 0;
            background: rgba(0,0,0,0.9);
            padding: 10px;
            border-radius: 10px;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            border: 2px solid #fff;
            z-index: 100;
            width: 250px;
        }
        .chip-menu.show {
            display: grid;
        }

        .chip-1 { background: radial-gradient(circle at 30% 30%, #fff, #bdbdbd); color: #333; }
        .chip-10 { background: radial-gradient(circle at 30% 30%, #fff, #42a5f5); color: #0d47a1; }
        .chip-100 { background: radial-gradient(circle at 30% 30%, #fff, #ef5350); color: #b71c1c; }
        .chip-500 { background: radial-gradient(circle at 30% 30%, #fff, #ab47bc); color: #4a148c; }
        
        /* Generic chip style for menu */
        .chip-menu-item {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ccc;
        }
        .chip-menu-item:hover { background: #eee; }

        .chip-modal-content {
            width: min(760px, 92vw);
            background: rgba(0,0,0,0.78);
            padding: 18px;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.25);
            max-height: 80vh;
            overflow: auto;
        }
        .chip-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .chip-modal-title {
            font-size: 1.3rem;
            font-weight: 900;
            color: #fff;
        }
        .chip-modal-subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 0.95rem;
            margin-bottom: 12px;
        }
        .chip-preset-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .chip-preset {
            height: 54px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.08);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            user-select: none;
        }
        .chip-preset.selected {
            border-color: rgba(255,215,0,0.95);
            background: rgba(255,215,0,0.18);
            box-shadow: 0 0 0 2px rgba(255,215,0,0.18) inset;
        }
        .chip-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 14px;
        }
        .chip-modal-actions button {
            padding: 10px 14px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.35);
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }
        .chip-modal-actions button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-import-btn {
            padding: 10px 16px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .icon-import-btn:active { transform: scale(0.98); }

        .asset-hint {
            margin-top: 8px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.85);
        }

        .btn {
            padding: 10px 30px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            color: white;
            font-size: 1.1rem;
            min-width: 100px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn:disabled { background: #777; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .btn-cancel { background: #f44336; }
        .btn-confirm { background: #4caf50; }
        .btn-repeat { background: #2196f3; }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: linear-gradient(135deg, #ffd700, #ff6f00);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 5px solid #fff;
            box-shadow: 0 0 50px #ff6f00;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .history-modal-content {
            width: min(900px, 92vw);
            max-height: 80vh;
            overflow: auto;
            background: rgba(0,0,0,0.75);
            padding: 18px;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.25);
        }
        .history-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .history-modal-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: #fff;
        }
        .history-modal-close {
            padding: 8px 12px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.35);
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }
        .history-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .history-list .history-item { width: 100%; }
        .audio-toggles {
            display: flex;
            gap: 8px;
            margin-left: 10px;
        }
        .audio-toggle {
            padding: 8px 10px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.25);
            color: #fff;
            font-weight: 900;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            font-size: 0.95rem;
        }
        .audio-toggle.off { opacity: 0.5; }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-title {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            margin: 0 0 20px 0;
        }
        .modal-score {
            font-size: 4rem;
            color: #d32f2f;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            background: #fff;
            padding: 10px 30px;
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .main-container { flex-direction: column; height: auto; overflow-y: auto; }
            .left-panel { height: 400px; }
            .wheel-container { width: 350px; height: 350px; }
            .light-ring { width: 350px; height: 350px; }
            .animal-ring-wrap { width: 320px; height: 320px; }
            .animal-ring-container { inset: 0; }
            .color-ring-container { width: 280px; height: 280px; }
            .center-circle { width: 200px; height: 200px; }
            .right-panel { width: 95%; }
            body { height: auto; overflow: auto; padding: 20px 0; }
            .history-list { grid-template-columns: repeat(2, 1fr); }
        }
        
        .win-highlight {
            animation: flash 0.5s infinite;
            border: 3px solid yellow !important;
            z-index: 100;
        }
        @keyframes flash {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="main-container">
    <!-- 左侧转盘 -->
    <div class="left-panel">
        <div class="timer-box">
            <div class="timer-val" id="countdown">20</div>
        </div>
        
        <div class="wheel-container">
            <div class="light-ring"></div>

            <div class="animal-ring-wrap">
                <div class="animal-band"></div>
                <div class="animal-ring-container" id="animal-ring"></div>
            </div>

            <div class="color-ring-container">
                <div class="color-ring" id="color-ring"></div>
            </div>
            
            <!-- 3. 指针 (顺时针转, 从中心指出来) -->
            <div class="pointer-container" id="pointer-container">
                <div class="bow-arrow-pointer"></div>
            </div>

            <!-- 4. 中心区域 (Logo / 动画) -->
            <div class="center-circle">
                <div class="center-logo" id="center-logo">
                    <h1>森林舞会</h1>
                    <h2>FOREST DANCE</h2>
                </div>
                <div class="win-animal-display" id="win-animal-display"></div>
                <div class="center-result" id="center-result"></div>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="history-wrap">
            <div class="history-bar" id="history-bar"></div>
            <button class="history-btn" onclick="openHistoryModal()">开奖记录</button>
        </div>
        <!-- 右侧押注 (保持不变) -->
        <div class="right-panel">
            <div class="bet-grid" id="bet-grid"></div>
            <div class="bottom-bar">
                <div class="info-row">
                    <div class="user-info">余额: <span id="balance">10000</span></div>
                    <div class="total-bet-display">本局押注: <span id="current-total-bet">0</span></div>
                </div>
                <div class="controls-row">
                    <div class="chip-selector">
                        <div class="chip selected" id="chip-btn-0"></div>
                        <div class="chip" id="chip-btn-1"></div>
                        <div class="chip" id="chip-btn-2"></div>
                        <div class="chip" id="chip-btn-3"></div>
                        
                        <div class="chip-setting-btn" id="chip-setting-btn" onclick="openChipModal()">⚙️</div>
                    </div>
                    <!-- Audio toggles moved to Modal -->
                    <div class="action-buttons">
                        <!-- Import button removed -->
                        <button class="btn btn-cancel" id="btn-cancel" onclick="cancelBets()">取消</button>
                        <button class="btn btn-confirm" id="btn-confirm" onclick="confirmBets()">确定</button>
                    </div>
                </div>
                <div class="asset-hint" id="asset-hint" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>

<input id="animal-file-input" type="file" accept="image/*" multiple style="display:none;" />

<div class="modal-overlay" id="win-modal">
    <div class="modal-content">
        <h2 class="modal-title">恭喜中奖!</h2>
        <div class="modal-score" id="win-score">0</div>
        <div style="margin-top: 20px; font-size: 1.2rem; color: #fff;">筹码已派发</div>
    </div>
</div>

<div class="modal-overlay" id="history-modal">
    <div class="history-modal-content">
        <div class="history-modal-header">
            <div class="history-modal-title">开奖记录</div>
            <button class="history-modal-close" onclick="closeHistoryModal()">关闭</button>
        </div>
        <div class="history-list" id="history-list"></div>
    </div>
</div>

<div class="modal-overlay" id="chip-modal">
    <div class="chip-modal-content">
        <div class="chip-modal-header">
            <div class="chip-modal-title">设置</div>
            <button class="history-modal-close" onclick="closeChipModal()">关闭</button>
        </div>
        
        <div class="audio-toggles" style="margin: 0 0 20px 0; justify-content: center;">
            <div class="audio-toggle" id="toggle-music" onclick="toggleMusic()">音乐</div>
            <div class="audio-toggle" id="toggle-sfx" onclick="toggleSfx()">音效</div>
        </div>

        <div class="chip-modal-subtitle" id="chip-modal-subtitle">请选择 4 个单价（必须正好 4 个）</div>
        <div class="chip-preset-grid" id="chip-preset-grid"></div>
        <div class="chip-modal-actions">
            <button onclick="closeChipModal()">取消</button>
            <button id="chip-modal-confirm" onclick="confirmChipSelection()" disabled>确定</button>
        </div>
    </div>
</div>

<script>
    // 音效资源
    const AUDIO_URLS = {
        vote: 'https://gc.andkids.xyz/yp/v20180829/resource/PC_ForestDanceMP/assets/output/common/sounds/ymfd_vote.12e0edb1.mp3',
        rotate_effect: 'https://gc.andkids.xyz/yp/v20180829/resource/PC_ForestDanceMP/assets/output/common/sounds/ymfd_rotate_effect.38ce3e0f.mp3',
        rotate_bgm: 'https://gc.andkids.xyz/yp/v20180829/resource/PC_ForestDanceMP/assets/output/common/sounds/ymfd_rotate_bgm.0525ce55.mp3',
        result: 'https://gc.andkids.xyz/yp/v20180829/resource/PC_ForestDanceMP/assets/output/common/sounds/ymfd_result.e78c6d83.mp3',
        add_score: 'https://gc.andkids.xyz/yp/v20180829/resource/PC_ForestDanceMP/assets/output/common/sounds/ymfd_press_continue.1fe08c91.mp3',
        bet: 'https://gc.andkids.xyz/yp/v20180829/resource/PC_ForestDanceMP/assets/output/common/sounds/ymfd_press.ffae2450.mp3',
        click: 'https://gc.andkids.xyz/yp/v20180829/resource/PC_ForestDanceMP/assets/output/common/sounds/ymfd_btn_tap.2e3e9d7c.mp3',
        bounce: 'https://gc.andkids.xyz/yp/v20180829/resource/PC_ForestDanceMP/assets/output/common/sounds/ymfd_bounce.b4bc1fa1.mp3'
    };

    const audioObjects = {};
    let isAudioEnabled = false;
    let isMusicEnabled = false;
    let isSfxEnabled = false;

    function preloadAudio() {
        for (let key in AUDIO_URLS) {
            const audio = new Audio(AUDIO_URLS[key]);
            audio.preload = 'auto';
            audioObjects[key] = audio;
        }
        audioObjects['vote'].loop = true;
        audioObjects['rotate_bgm'].loop = true;
    }

    function startAudioContext() {
        const prompt = document.getElementById('audio-prompt');
        if (prompt) prompt.style.display = 'none';
        isAudioEnabled = true;
        syncMusicForState();
    }

    function playAudio(key) {
        if (!isAudioEnabled || !audioObjects[key]) return;
        if (document.hidden) return;
        const isMusic = key === 'vote' || key === 'rotate_bgm';
        if (isMusic && !isMusicEnabled) return;
        if (!isMusic && !isSfxEnabled) return;
        if (!audioObjects[key].loop) audioObjects[key].currentTime = 0;
        audioObjects[key].play().catch(e => console.log(e));
    }

    function stopAudio(key) {
        if (!audioObjects[key]) return;
        audioObjects[key].pause();
        audioObjects[key].currentTime = 0;
    }

    function stopAllAudio() {
        Object.keys(audioObjects).forEach(key => {
            audioObjects[key].pause();
            audioObjects[key].currentTime = 0;
        });
    }

    function readBoolLS(key, fallback) {
        try {
            const v = localStorage.getItem(key);
            if (v === null) return fallback;
            return v === '1';
        } catch (e) {
            return fallback;
        }
    }

    function writeBoolLS(key, val) {
        try { localStorage.setItem(key, val ? '1' : '0'); } catch (e) {}
    }

    function refreshAudioToggleUI() {
        const tMusic = document.getElementById('toggle-music');
        const tSfx = document.getElementById('toggle-sfx');
        if (tMusic) tMusic.classList.toggle('off', !isMusicEnabled);
        if (tSfx) tSfx.classList.toggle('off', !isSfxEnabled);
    }

    function applyAudioPrefsFromStorage() {
        isMusicEnabled = readBoolLS('fd_music', false);
        isSfxEnabled = readBoolLS('fd_sfx', false);
        refreshAudioToggleUI();
    }

    function syncMusicForState() {
        stopAudio('vote');
        stopAudio('rotate_bgm');
        if (!isAudioEnabled || !isMusicEnabled) return;
        if (state.gameState === 'BETTING') playAudio('vote');
        if (state.gameState === 'SPINNING') playAudio('rotate_bgm');
    }

    function toggleMusic() {
        if (!isAudioEnabled) startAudioContext();
        isMusicEnabled = !isMusicEnabled;
        writeBoolLS('fd_music', isMusicEnabled);
        refreshAudioToggleUI();
        syncMusicForState();
    }

    function toggleSfx() {
        if (!isAudioEnabled) startAudioContext();
        isSfxEnabled = !isSfxEnabled;
        writeBoolLS('fd_sfx', isSfxEnabled);
        refreshAudioToggleUI();
    }

    preloadAudio();
    const CHIP_PRESETS = [1, 2, 5, 10, 50, 100, 500, 1000];

    function readJSONLS(key, fallback) {
        try {
            const v = localStorage.getItem(key);
            if (!v) return fallback;
            return JSON.parse(v);
        } catch (e) {
            return fallback;
        }
    }

    function writeJSONLS(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }

    function loadChipOptions() {
        const v = readJSONLS('fd_chip_options', null);
        if (!Array.isArray(v)) return;
        const cleaned = v
            .map(n => Number(n))
            .filter(n => Number.isFinite(n) && CHIP_PRESETS.includes(n));
        const uniq = Array.from(new Set(cleaned)).slice(0, 4).sort((a, b) => a - b);
        if (uniq.length === 4) state.chipOptions = uniq;
    }

    function renderChipButtons() {
        const ids = ['chip-btn-0', 'chip-btn-1', 'chip-btn-2', 'chip-btn-3'];
        const opts = (state.chipOptions || []).slice(0, 4).sort((a, b) => a - b);
        while (opts.length < 4) opts.push(CHIP_PRESETS[opts.length] || 1);
        state.chipOptions = opts;

        ids.forEach((id, i) => {
            const el = document.getElementById(id);
            if (!el) return;
            const val = opts[i];
            el.textContent = String(val);
            el.dataset.val = String(val);
            el.onclick = () => selectChip(val);
        });

        if (!opts.includes(state.currentChip)) {
            state.currentChip = opts[0];
        }
        const chipEls = ids.map(id => document.getElementById(id)).filter(Boolean);
        chipEls.forEach(el => el.classList.toggle('selected', Number(el.dataset.val) === state.currentChip));
    }

    function updateChipModalUI(selectedSet) {
        const selected = Array.from(selectedSet).sort((a, b) => a - b);
        if (chipModalSubtitle) chipModalSubtitle.textContent = `已选择 ${selected.length}/4：${selected.join('、') || '—'}`;
        if (chipModalConfirmBtn) chipModalConfirmBtn.disabled = selected.length !== 4;
    }

    function openChipModal() {
        if (!chipModal || !chipPresetGrid) return;
        const selectedSet = new Set(state.chipOptions);
        const syncSelection = () => { chipModal.dataset.selection = JSON.stringify(Array.from(selectedSet)); };
        chipPresetGrid.innerHTML = '';
        CHIP_PRESETS.forEach(val => {
            const el = document.createElement('div');
            el.className = 'chip-preset';
            el.textContent = String(val);
            el.dataset.val = String(val);
            const refresh = () => el.classList.toggle('selected', selectedSet.has(val));
            refresh();
            el.addEventListener('click', () => {
                if (selectedSet.has(val)) selectedSet.delete(val);
                else {
                    if (selectedSet.size >= 4) return;
                    selectedSet.add(val);
                }
                refresh();
                syncSelection();
                updateChipModalUI(selectedSet);
            });
            chipPresetGrid.appendChild(el);
        });

        syncSelection();
        updateChipModalUI(selectedSet);
        chipModal.style.display = 'flex';
    }

    function closeChipModal() {
        if (!chipModal) return;
        chipModal.style.display = 'none';
    }

    function confirmChipSelection() {
        if (!chipModal) return;
        const selected = (() => {
            try { return JSON.parse(chipModal.dataset.selection || '[]'); } catch (e) { return []; }
        })();
        const uniq = Array.from(new Set(selected))
            .map(n => Number(n))
            .filter(n => Number.isFinite(n) && CHIP_PRESETS.includes(n))
            .sort((a, b) => a - b);
        if (uniq.length !== 4) return;
        state.chipOptions = uniq;
        writeJSONLS('fd_chip_options', uniq);
        renderChipButtons();
        closeChipModal();
        playAudio('click');
    }

    // 配置
    const ANIMALS = [
        { id: 'lion', name: '狮子', icon: 'assets/animals/lion.jpg', odds: [28, 31, 40] },
        { id: 'panda', name: '熊猫', icon: 'assets/animals/panda.jpg', odds: [14, 17, 20] },
        { id: 'monkey', name: '猴子', icon: 'assets/animals/monkey.jpg', odds: [8, 10, 11] },
        { id: 'rabbit', name: '兔子', icon: 'assets/animals/rabbit.jpg', odds: [5, 6, 8] }
    ];
    
    const COLORS = [
        { id: 'red', name: '红', color: '#e74c3c' },
        { id: 'green', name: '绿', color: '#2ecc71' },
        { id: 'yellow', name: '黄', color: '#f1c40f' }
    ];

    const WHEEL_LAYOUT = [];
    const animalPattern = [
        'rabbit', 'monkey', 'rabbit', 'monkey', 'panda', 'lion',
        'rabbit', 'monkey', 'rabbit', 'monkey', 'panda', 'lion',
        'rabbit', 'monkey', 'rabbit', 'monkey', 'panda', 'lion',
        'rabbit', 'monkey', 'rabbit', 'monkey', 'panda', 'lion'
    ]; 
    
    for (let i = 0; i < 24; i++) {
        const animalId = animalPattern[i];
        const animal = ANIMALS.find(a => a.id === animalId);
        WHEEL_LAYOUT.push({
            index: i,
            animal: animal,
            angle: i * (360 / 24)
        });
    }

    // 状态
    let state = {
        balance: 10000,
        currentChip: 1,
        chipOptions: [1, 10, 100, 500],
        pendingBets: {}, 
        confirmedBets: {}, 
        previousBets: {}, 
        gameState: 'BETTING', 
        timeLeft: 15,
        pointerRotation: 0,
        animalRingRotation: 0,
        history: [],
        spinId: 0
    };

    // DOM Elements
    const colorRing = document.getElementById('color-ring');
    const animalRing = document.getElementById('animal-ring');
    const pointerContainer = document.getElementById('pointer-container');
    const betGrid = document.getElementById('bet-grid');
    const countdownEl = document.getElementById('countdown');
    const balanceEl = document.getElementById('balance');
    const currentTotalBetEl = document.getElementById('current-total-bet');
    const historyBar = document.getElementById('history-bar');
    const historyModal = document.getElementById('history-modal');
    const historyList = document.getElementById('history-list');
    const chipModal = document.getElementById('chip-modal');
    const chipPresetGrid = document.getElementById('chip-preset-grid');
    const chipModalConfirmBtn = document.getElementById('chip-modal-confirm');
    const chipModalSubtitle = document.getElementById('chip-modal-subtitle');
    const btnConfirm = document.getElementById('btn-confirm');
    const btnCancel = document.getElementById('btn-cancel');
    const winModal = document.getElementById('win-modal');
    const winScoreEl = document.getElementById('win-score');
    const centerLogo = document.getElementById('center-logo');
    const winAnimalDisplay = document.getElementById('win-animal-display');
    const centerResult = document.getElementById('center-result');
    const animalFileInput = document.getElementById('animal-file-input');
    const assetHint = document.getElementById('asset-hint');

    function animalSpriteHTML(animal) {
        if (animal.id === 'panda') {

    function colorToRgba(color, alpha) {
        if (typeof color === 'string' && color.startsWith('#') && (color.length === 7 || color.length === 4)) {
            const hex = color.length === 4
                ? `#${color[1]}${color[1]}${color[2]}${color[2]}${color[3]}${color[3]}`
                : color;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        return color;
    }

    function spriteChromaKeyToDataURL(img, opts) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = img.naturalWidth || img.width;
        canvas.height = img.naturalHeight || img.height;
        ctx.drawImage(img, 0, 0);

        const { width, height } = canvas;
        const imageData = ctx.getImageData(0, 0, width, height);
        const data = imageData.data;

        const sample = (x, y) => {
            const i = (y * width + x) * 4;
            return [data[i], data[i + 1], data[i + 2]];
        };
        const corners = [
            sample(0, 0),
            sample(width - 1, 0),
            sample(0, height - 1),
            sample(width - 1, height - 1)
        ];
        const bg = corners.reduce((acc, c) => [acc[0] + c[0], acc[1] + c[1], acc[2] + c[2]], [0, 0, 0]).map(v => v / corners.length);

        const threshold = opts?.threshold ?? 55;
        const feather = opts?.feather ?? 20;
        const minBrightness = opts?.minBrightness ?? 190;
        const maxChroma = opts?.maxChroma ?? 60;

        const toIndex = (x, y) => (y * width + x);
        const visited = new Uint8Array(width * height);
        const isBgLike = (r, g, b) => {
            const maxv = Math.max(r, g, b);
            const minv = Math.min(r, g, b);
            const brightness = (r + g + b) / 3;
            const chroma = maxv - minv;
            if (brightness < minBrightness || chroma > maxChroma) return false;
            const dr = r - bg[0];
            const dg = g - bg[1];
            const db = b - bg[2];
            const dist = Math.sqrt(dr * dr + dg * dg + db * db);
            return dist <= threshold;
        };

        const qx = [];
        const qy = [];
        const push = (x, y) => {
            const idx = toIndex(x, y);
            if (visited[idx]) return;
            visited[idx] = 1;
            qx.push(x);
            qy.push(y);
        };

        for (let x = 0; x < width; x++) {
            push(x, 0);
            push(x, height - 1);
        }
        for (let y = 0; y < height; y++) {
            push(0, y);
            push(width - 1, y);
        }

        const removed = new Uint8Array(width * height);
        while (qx.length) {
            const x = qx.pop();
            const y = qy.pop();
            const p = (y * width + x) * 4;
            const r = data[p];
            const g = data[p + 1];
            const b = data[p + 2];
            if (!isBgLike(r, g, b)) continue;
            data[p + 3] = 0;
            removed[toIndex(x, y)] = 1;
            if (x > 0) push(x - 1, y);
            if (x < width - 1) push(x + 1, y);
            if (y > 0) push(x, y - 1);
            if (y < height - 1) push(x, y + 1);
        }

        for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
                const idx = toIndex(x, y);
                if (removed[idx]) continue;
                const p = idx * 4;
                const r = data[p];
                const g = data[p + 1];
                const b = data[p + 2];
                const maxv = Math.max(r, g, b);
                const minv = Math.min(r, g, b);
                const brightness = (r + g + b) / 3;
                const chroma = maxv - minv;
                if (brightness < minBrightness || chroma > maxChroma) continue;
                const dr = r - bg[0];
                const dg = g - bg[1];
                const db = b - bg[2];
                const dist = Math.sqrt(dr * dr + dg * dg + db * db);
                if (dist <= threshold || dist >= threshold + feather) continue;
                const n =
                    removed[toIndex(x - 1, y)] ||
                    removed[toIndex(x + 1, y)] ||
                    removed[toIndex(x, y - 1)] ||
                    removed[toIndex(x, y + 1)];
                if (!n) continue;
                const t = (dist - threshold) / feather;
                data[p + 3] = Math.round(data[p + 3] * t);
            }
        }
        ctx.putImageData(imageData, 0, 0);
        return canvas.toDataURL('image/png');
    }

    function setAnimalIconVar(animalId, dataUrl) {
        document.documentElement.style.setProperty(`--animal-${animalId}-url`, `url('${dataUrl}')`);
    }

    function setAnimalIconFromDataURL(animalId, dataUrl) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                let processed = dataUrl;
                try {
                    processed = spriteChromaKeyToDataURL(img, { threshold: 55, feather: 20, minBrightness: 190, maxChroma: 60 });
                } catch (e) {}
                setAnimalIconVar(animalId, processed);
                try { localStorage.setItem(`fd_animal_${animalId}`, processed); } catch (e) {}
                resolve(true);
            };
            img.onerror = () => resolve(false);
            img.src = dataUrl;
        });
    }

    function prepareAnimalIconTransparent(animalId) {
        return new Promise(resolve => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                try {
                    // Use less aggressive settings for Panda to avoid removing white face
                    let opts = { threshold: 55, feather: 20, minBrightness: 190, maxChroma: 60 };
                    if (animalId === 'panda') {
                        // Panda has black and white. Background is likely not pure white in photo?
                        // If background is complex, this simple algo might fail.
                        // But user provided JPGs.
                        // Assuming corner sampling works.
                        // Increase tolerance but ensure we don't eat into the face.
                        // Panda face is white (high brightness, low chroma).
                        // If background is also white/light, it's hard.
                        // Let's assume background differs enough.
                        // Or maybe background is dark?
                        // If background is white, and panda face is white, we need to be careful.
                        // Reduce threshold.
                        opts = { threshold: 30, feather: 10, minBrightness: 200, maxChroma: 30 };
                    }
                    const url = spriteChromaKeyToDataURL(img, opts);
                    setAnimalIconVar(animalId, url);
                } catch (e) { console.error(e); }
                resolve();
            };
            img.onerror = () => resolve();
            // Use the local JPG path
            img.src = `assets/animals/${animalId}.jpg`;
        });
    }

        const ids = ['lion', 'panda', 'monkey', 'rabbit'];

                if (v) {

                    loaded++;
                }
            } catch (e) {}
        });
        return loaded;
    }

    function inferAnimalIdFromName(name) {
        const s = String(name || '').toLowerCase();
        if (s.includes('lion') || s.includes('shi') || s.includes('狮')) return 'lion';
        if (s.includes('panda') || s.includes('xiongmao') || s.includes('熊猫')) return 'panda';
        if (s.includes('monkey') || s.includes('hou') || s.includes('猴')) return 'monkey';
        if (s.includes('rabbit') || s.includes('tuzi') || s.includes('兔')) return 'rabbit';
        return null;
    }

    async function handleAnimalFiles(files) {
        const list = Array.from(files || []);
        if (list.length === 0) return;

        const mapped = {};
        const unknown = [];
        list.forEach(f => {
            const id = inferAnimalIdFromName(f.name);
            if (id && !mapped[id]) mapped[id] = f;
            else unknown.push(f);
        });
        const order = ['lion', 'monkey', 'panda', 'rabbit'];
        order.forEach(id => {
            if (!mapped[id] && unknown.length) mapped[id] = unknown.shift();
        });

        const ids = ['lion', 'panda', 'monkey', 'rabbit'];
        for (const id of ids) {
            const f = mapped[id];
            if (!f) continue;
            const dataUrl = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => resolve('');
                reader.readAsDataURL(f);
            });
            if (dataUrl) await setAnimalIconFromDataURL(id, dataUrl);
        }
        showAssetHint('头像已导入并去白底完成（已保存到本地缓存）。');
    }

    function renderWheelAnimals() {
        // Use container size
        const containerSize = document.querySelector('.wheel-container').getBoundingClientRect();
        const size = Math.min(containerSize.width, containerSize.height);
        
        // Inset is 40px, so ring diameter is size - 80. Radius is (size - 80)/2
        // Item center should be on this circle? No.
        // The container .animal-ring-container matches the inset (size - 80).
        // So its width is size-80. Its center is at (size-80)/2, (size-80)/2.
        
        const ringDiameter = size - 80;
        const center = ringDiameter / 2;
        const wheelItemSize = 78;
        
        // Align with Color Ring
        // Color Ring inset is 120px. Diameter = size - 240. Radius = (size - 240)/2.
        // We want animals just outside the color ring.
        // Color Ring Outer Radius = (size - 240)/2.
        // Animal Center Radius = Color Ring Outer Radius + Gap + (ItemSize/2).
        // Let's check visually.
        // Current Inset difference: 120 - 40 = 80px gap on each side.
        // The space between Animal Ring Outer Edge and Color Ring Outer Edge is 80px.
        // Animal Item is ~80px. So it fits exactly?
        
        // Let's recalculate radius based on Color Ring + padding.
        const colorRingRadius = (size - 240) / 2;
        const radius = colorRingRadius + (wheelItemSize / 2) + 15; // 15px gap
        
        animalRing.innerHTML = '';
        const step = 360 / 24;
        const currentRingRot = state.animalRingRotation;

        WHEEL_LAYOUT.forEach((item, i) => {
            const angleDeg = item.angle + (step / 2); 
            const angleRad = (angleDeg - 90) * (Math.PI / 180);
            
            // Coordinates relative to the center of .animal-ring-container
            // Since .animal-ring-container is (size-80)x(size-80), center is at middle.
            
            const x = center + radius * Math.cos(angleRad);
            const y = center + radius * Math.sin(angleRad);
            
            const el = document.createElement('div');
            el.className = 'wheel-item';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            // Rotate to be upright.
            // Ring rotates by currentRingRot.
            // Item is at angleDeg relative to ring.
            // Item Rotation relative to screen = RingRot.
            // To be upright (0 deg screen), Item Local Rot = -RingRot.
            el.style.transform = `translate(-50%, -50%) rotate(${-currentRingRot}deg)`;
            el.innerHTML = animalSpriteHTML(item.animal);
            
            animalRing.appendChild(el);
        });
    }

    let currentColorMap = []; 
    
    function generateRandomColorMap() {
        // Minimum 3 for each color
        const counts = [3, 3, 3];
        let remaining = 24 - 9; // 15 slots to distribute randomly
        
        // Distribute remaining slots
        for (let i = 0; i < remaining; i++) {
            const randIndex = Math.floor(Math.random() * 3);
            counts[randIndex]++;
        }

        let pool = [];
        // Fill pool based on counts
        for (let i = 0; i < counts[0]; i++) pool.push(COLORS[0]);
        for (let i = 0; i < counts[1]; i++) pool.push(COLORS[1]);
        for (let i = 0; i < counts[2]; i++) pool.push(COLORS[2]);
        
        // Shuffle
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool;
    }

    function updateGradient(map) {
        colorRing.innerHTML = ''; 
        let gradientStr = '';
        const step = 360 / 24;
        const gap = 1.5;
        const gapColor = '#1a0f0a';

        map.forEach((color, i) => {
            const startAngle = i * step + gap/2;
            const endAngle = (i + 1) * step - gap/2;
            gradientStr += `${color.color} ${startAngle}deg ${endAngle}deg, ${gapColor} ${endAngle}deg ${endAngle + gap}deg,`;
        });
        
        gradientStr = gradientStr.slice(0, -1);
        colorRing.style.background = `conic-gradient(${gradientStr})`;
    }

    function randomizeColors() {
        currentColorMap = generateRandomColorMap();
        updateGradient(currentColorMap);
    }
    
    function animateColorRefresh() {
        const nextMap = generateRandomColorMap();
        const duration = 1000; // 1s
        const stepTime = duration / 24;
        
        // Sequential update clockwise
        for (let i = 0; i < 24; i++) {
            setTimeout(() => {
                currentColorMap[i] = nextMap[i];
                updateGradient(currentColorMap);
                // Optional: Play a tick sound?
                // playAudio('tick'); 
            }, i * stepTime);
        }
    }

    function selectChip(val) {
        state.currentChip = val;
        const ids = ['chip-btn-0', 'chip-btn-1', 'chip-btn-2', 'chip-btn-3'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.toggle('selected', Number(el.dataset.val) === val);
        });
        
        playAudio('click');
    }

    function placeBet(key) {
        if (state.gameState !== 'BETTING') return;
        const potentialTotal = calculateTotalPending() + calculateTotalConfirmed() + state.currentChip;
        if (state.balance >= potentialTotal) {
            state.pendingBets[key] = (state.pendingBets[key] || 0) + state.currentChip;
            updateBetDisplay(key);
            updateTotalBet();
            checkConfirmButtonState();
            playAudio('bet');
        }
    }
    
    function confirmBets() {
        playAudio('click');
        if (btnConfirm.textContent.includes('重复') && Object.keys(state.pendingBets).length === 0) {
            if (Object.keys(state.previousBets).length > 0) {
                let prevTotal = 0;
                for(let k in state.previousBets) prevTotal += state.previousBets[k];
                if (state.balance >= calculateTotalConfirmed() + prevTotal) {
                    state.pendingBets = {...state.previousBets};
                    for (let k in state.pendingBets) updateBetDisplay(k);
                    updateTotalBet();
                    btnConfirm.textContent = "确定";
                    return;
                } else {
                    alert("余额不足以重复押注");
                    return;
                }
            }
        }
        
        let totalPending = calculateTotalPending();
        if (totalPending === 0) return;
        state.balance -= totalPending;
        updateBalance();
        for (let key in state.pendingBets) {
            state.confirmedBets[key] = (state.confirmedBets[key] || 0) + state.pendingBets[key];
        }
        state.pendingBets = {};
        renderAllBets();
        updateTotalBet();
        checkConfirmButtonState();
    }
    
    function cancelBets() {
        playAudio('click');
        if (state.gameState !== 'BETTING') return;
        const keys = Object.keys(state.pendingBets);
        state.pendingBets = {};
        keys.forEach(k => updateBetDisplay(k));
        renderAllBets();
        updateTotalBet();
        checkConfirmButtonState();
    }
    
    function calculateTotalPending() { return Object.values(state.pendingBets).reduce((a,b)=>a+b, 0); }
    function calculateTotalConfirmed() { return Object.values(state.confirmedBets).reduce((a,b)=>a+b, 0); }
    function updateTotalBet() { currentTotalBetEl.textContent = calculateTotalPending() + calculateTotalConfirmed(); }
    
    function updateBetDisplay(key) {
        const el = document.getElementById(`bet-${key}`);
        if (!el) return;
        const total = (state.confirmedBets[key] || 0) + (state.pendingBets[key] || 0);
        el.textContent = total;
        if (state.pendingBets[key] > 0) el.classList.add('pending');
        else el.classList.remove('pending');
    }
    
    function renderAllBets() {
        const allKeys = new Set([...Object.keys(state.pendingBets), ...Object.keys(state.confirmedBets)]);
        allKeys.forEach(key => updateBetDisplay(key));
    }
    
    function updateBalance() { balanceEl.textContent = state.balance; }

    function checkConfirmButtonState() {
        const hasPending = Object.keys(state.pendingBets).length > 0;
        const hasHistory = Object.keys(state.previousBets).length > 0;
        const hasConfirmed = Object.keys(state.confirmedBets).length > 0;
        btnCancel.disabled = !(state.gameState === 'BETTING' && hasPending);
        
        if (hasPending) {
            btnConfirm.textContent = "确定";
            btnConfirm.classList.remove('btn-repeat');
            btnConfirm.classList.add('btn-confirm');
            btnConfirm.disabled = false;
        } else if (hasConfirmed) {
             btnConfirm.textContent = "已确认";
             btnConfirm.disabled = true;
        } else if (hasHistory) {
            btnConfirm.textContent = "重复";
            btnConfirm.classList.add('btn-repeat');
            btnConfirm.classList.remove('btn-confirm');
            btnConfirm.disabled = false;
        } else {
            btnConfirm.textContent = "确定";
            btnConfirm.classList.remove('btn-repeat');
            btnConfirm.classList.add('btn-confirm');
            btnConfirm.disabled = true;
        }
    }
